<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kulshar Library - Book Entry Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Cairo',sans-serif;
}

body{
    min-height:100vh;
    background:url('https://images.unsplash.com/photo-1521587760476-6c12a4b040da?q=80&w=1600') center center/cover no-repeat;
    position:relative;
}

body::before{
    content:'';
    position:absolute;
    inset:0;
    background:rgba(15,23,42,.65);
    backdrop-filter:blur(8px);
}

.container{
    position:relative;
    z-index:1;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.login-card{
    width:100%;
    max-width:450px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.15);
    border-radius:25px;
    padding:35px;
    color:#fff;
    box-shadow:0 20px 40px rgba(0,0,0,.35);
}

.logo{
    text-align:center;
    font-size:60px;
    margin-bottom:10px;
}

.title{
    text-align:center;
    font-size:30px;
    font-weight:700;
    color:#d4af37;
}

.subtitle{
    text-align:center;
    margin-top:10px;
    color:#e2e8f0;
    font-size:15px;
}

.input-group{
    margin-top:20px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#f8fafc;
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    outline:none;
    background:rgba(255,255,255,.12);
    color:#fff;
    font-size:15px;
}

input::placeholder{
    color:#cbd5e1;
}

button{
    width:100%;
    margin-top:25px;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#d4af37;
    color:#0f172a;
    font-weight:700;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
}

.error{
    color:#ffb4b4;
    margin-top:15px;
    text-align:center;
    display:none;
}

.portal{
    display:none;
    position:relative;
    z-index:2;
    width:100%;
    background:white;
    min-height:100vh;
}

.portal-header{
    background:#0f172a;
    color:white;
    padding:20px;
    text-align:center;
}

.portal-header h1{
    color:#d4af37;
}

iframe{
    width:100%;
    border:none;
    height:2200px;
}
</style>

</head>

<body>

<div class="container" id="loginPage">

```
<div class="login-card">

    <div class="logo">📚</div>

    <div class="title">
        Kulshar Library
    </div>

    <div class="subtitle">
        Book Entry Portal<br>
        Authorized Library Staff Only
    </div>

    <div class="input-group">
        <label>Mobile Number</label>
        <input
            type="tel"
            id="mobile"
            placeholder="Enter mobile number">
    </div>

    <div class="input-group">
        <label>Password</label>
        <input
            type="password"
            id="password"
            placeholder="Enter password">
    </div>

    <button onclick="login()">
        🔓 Unlock Portal
    </button>

    <div class="error" id="errorMsg">
        Invalid mobile number or password.
    </div>

</div>
```

</div>

<div class="portal" id="portal">

```
<div class="portal-header">
    <h1>📚 Kulshar Library</h1>
    <p>Book Entry Management Portal</p>
</div>

<iframe
    src="https://docs.google.com/forms/d/e/1FAIpQLSfv9TXExX3iUQ9ZmQyu7GwRkolUV4kOOiYGeMauvaZzcf2YJg/viewform?embedded=true">
</iframe>
```

</div>

<script>
const users = [
  {
    mobile: "7219638796",
    password: "Abdullah",
    role: "Admin"
  },
  {
    mobile: "8874311542",
    password: "Zubair",
    role: "Librarian"
  }
];

function login() {

  const mobile =
    document.getElementById("mobile").value.trim();

  const password =
    document.getElementById("password").value.trim();

  const user = users.find(
    u =>
      u.mobile === mobile &&
      u.password === password
  );

  if (user) {

    document.getElementById("loginPage").style.display = "none";
    document.getElementById("portal").style.display = "block";

    console.log("Logged in as:", user.role);

  } else {

    document.getElementById("errorMsg").style.display = "block";
  }
}
</script>

</body>
</html>
